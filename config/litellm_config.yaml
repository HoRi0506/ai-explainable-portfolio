# LiteLLM 모델 라우팅 (3-Tier)
# Phase 1a: 직접 API 호출. Phase 2+: LiteLLM Proxy 전환 예정

tiers:
  quick:
    model: gemini/gemini-2.5-flash
    purposes:
      - data_collection
      - monitoring_text
    timeout_sec: 30
    max_retries: 2
  smart:
    model: openai/gpt-4o
    purposes:
      - trade_analysis
      - decision_making
    timeout_sec: 30
    max_retries: 2
  expert:
    model: anthropic/claude-sonnet-4-20250514
    purposes:
      - edge_cases
      - high_uncertainty
    timeout_sec: 30
    max_retries: 2

default_tier: smart

# 라우팅 규칙: 용도별 티어 매핑 (decision_making은 절대 quick으로 폴백하지 않음)
routing:
  data_collection: quick
  monitoring_text: quick
  trade_analysis: smart
  decision_making: smart
  edge_cases: expert
